<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-sacel=1.0" />
        <tittle>Calulator</tittle>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>

        <div class="calculator">
            
                <div calss="display">
                    <span id="expression"></span>
                    <span id="result">0</span>
                </div>

            <div class="buttons">

                <button calss="btn ac"  id="ac">AC</button>
                <button calss="btn op"  id="sign">+/-</button>
                <button calss="btn op"  id="porcent">%</button>
                <button calss="btn op"  data-op="/">÷</button>

                <button class="btn num" data-num="7">7</button>
                <button class="btn num" data-num="8">8</button>
                <button class="btn num" data-num="9">9</button>
                <button class="btn op"  data-op="*">x</button>

                <button class="btn num" data-num="4">4</button>
                <button class="btn num" data-num="5">5</button>
                <button class="btn num" data-num="6">6</button>
                <button class="btn op"  data-op="-">-</button>

                <button class="btn num" data-num="1">1</button>
                <button class="btn num" data-num="2">2</button>
                <button class="btn num" data-num="3">3</button>
                <button class="btn op"  data-op="+">+</button>

                <button class="btn num zero"    data-num="0">0</button>
                <button class="btn num" id="dot">.</button>
                <button class="btn op"  id="equals">=</button>
                
            </div>
        </div>

        <script src="script.sj"></script>
    </body>
</html>
